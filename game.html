<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #050505; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; }
        
        #ui-layer {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            display: none; /* Hidden on menu */
        }

        .stamina-bar-container {
            width: 200px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        #stamina-fill {
            width: 100%;
            height: 100%;
            background: #00ff88;
            transform-origin: left;
            transition: background-color 0.3s ease;
        }

        /* Controls UI (middle-right) */
        #controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 260px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            letter-spacing: 0.8px;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            image-rendering: pixelated;
            z-index: 12;
            border: 3px solid #9aa0a6; 
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.6);
            display: none; /* Hidden on menu */
        }
        #controls .ctrl { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        #controls .label { flex: 1; font-weight: 700; text-transform: uppercase; font-size: 11px; }
        #controls .keys { font-size: 11px; color: #111; margin-top: 2px; font-family: 'Press Start 2P', monospace; display: inline-flex; align-items: center; gap: 8px; background: #bfbfbf; padding: 4px 8px; border-radius: 4px; color: #0a0a0a; }
        #controls .cd-number { min-width: 26px; text-align: center; background: rgba(10,10,10,0.9); color: #fff; padding: 2px 4px; border-radius: 3px; font-size: 10px; }
        #controls .cd { display: none; }
        #controls .cd-fill { display: none; }

        /* --- NEW UI ELEMENTS --- */
        #level-banner {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            text-align: center;
            text-shadow: 4px 4px #ff4500;
            z-index: 20;
            pointer-events: none;
            display: none;
        }

        /* --- TUTORIAL UI --- */
        #tutorial-text {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            text-align: center;
            text-shadow: 3px 3px #00ff88;
            z-index: 25;
            pointer-events: none;
            opacity: 0;
            white-space: nowrap;
        }

        #rating-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid #ff4500;
            padding: 30px;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 50px rgba(255, 69, 0, 0.5);
        }

        .star { font-size: 40px; color: #444; transition: 0.3s; }
        .star.active { color: #ffd700; text-shadow: 0 0 10px #fff; }
        
        #stats-panel { font-size: 10px; text-align: left; margin: 20px 0; line-height: 1.8; }
        
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .retry-btn { 
            background: #ff4500; color: #fff; border: none; padding: 10px 15px; 
            font-family: 'Press Start 2P'; cursor: pointer; font-size: 10px;
            transition: 0.2s; border: 2px solid transparent;
        }
        .retry-btn:hover { background: #fff; color: #ff4500; border: 2px solid #ff4500; }

        /* --- LEVEL SELECTOR --- */
        #level-selector {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,5,0.98);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
        }
        #level-selector h1 {
            color: #ff4500;
            text-shadow: 4px 4px #000;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .level-list {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
        }
        .level-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #66ccff;
            padding: 30px 20px;
            cursor: pointer;
            text-align: center;
            width: 320px;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(102, 204, 255, 0.1);
        }
        .level-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(102, 204, 255, 0.4);
        }
        .level-card h3 { font-size: 14px; margin-bottom: 15px; line-height: 1.4; }
        .menu-stars { margin-top: 15px; color: #444; font-size: 24px; letter-spacing: 5px; }
        .menu-stars span.earned { color: #ffd700; text-shadow: 0 0 10px #ffd700; }

    </style>
</head>
<body>

<div id="level-selector">
    <h1>VAULT</h1>
    <div class="level-list">
        <div class="level-card" onclick="startLevel(1)">
            <h3>LEVEL 1<br><br>THE FOUNDRY</h3>
            <div class="menu-stars" id="menu-star-1"><span>★</span><span>★</span><span>★</span></div>
        </div>
        <div class="level-card" onclick="startLevel(2)">
            <h3>LEVEL 2<br><br>THE NEON THRESHER</h3>
            <div class="menu-stars" id="menu-star-2"><span>★</span><span>★</span><span>★</span></div>
        </div>
    </div>
</div>

<div id="level-banner">LEVEL 1 - THE FOUNDRY</div>
<div id="tutorial-text">TUTORIAL START</div>

<div id="ui-layer">
    <div class="stamina-bar-container" id="stamina-box">
        <div id="stamina-fill"></div>
    </div>
</div>

<div id="rating-screen">
    <h2>CLEARED!</h2>
    <div id="star-row">
        <span class="star" id="star1">★</span>
        <span class="star" id="star2">★</span>
        <span class="star" id="star3">★</span>
    </div>
    <div id="stats-panel">
        <div id="stat-time">TIME: 00:00</div>
        <div id="stat-style">STYLE: 0</div>
        <div id="stat-flow">MAX FLOW: 0%</div>
    </div>
    <div class="btn-group">
        <button class="retry-btn" onclick="returnToMenu()">MENU</button>
        <button class="retry-btn" onclick="restartLevel()">RESTART</button>
        <button class="retry-btn" onclick="nextLevel()">NEXT LEVEL</button>
    </div>
</div>

<script>
const CONFIG = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#050505',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1800 }, debug: false }
    },
    scene: { preload, create, update }
};

const game = new Phaser.Game(CONFIG);

let player, keys, stamina = 100;
let isSprinting = false, isSliding = false, isGrabbing = false, isDiving = false, isRolling = false;
let trailEmitter, landEmitter, windEmitter, speedLines;
let staminaFill, staminaBox;
let audioCtx, masterGain, masterFilter, musicOsc, musicGain;
let lastSpeedSfx = 0, lastDroneTime = 0;
let platforms, sceneRef;
let currentLevel = 0; // 0 = Menu
let levelObjects = [];
let levelZones = {};
let checkpoint = { x: 200, y: 200 };
let onRamp = false;
let breathingInterval = null;
const baseMusicFreq = 110; // Hz for subtle drone

// --- LEVEL VARIABLES ---
let startTime, endTime, levelFinished = false;
let stylePoints = 0;
let maxVelocityReached = 0;
let checkpoints;
let finishLine;

// --- TUTORIAL VARIABLES ---
let tutorialTriggerZones;
let tutorialTextElement;

// --- LEVEL 2 VARIABLES ---
let speedingWall;
let wallSpeed = 250;
let hidingSpots;
let isHidden = false;
let wallSpeedTrigger;

function syncBody(sprite) {
    if (!sprite || !sprite.body) return;
    const w = Math.max(4, Math.round(sprite.displayWidth));
    const h = Math.max(4, Math.round(sprite.displayHeight));
    sprite.body.setSize(w, h);
    const originY = (typeof sprite.originY !== 'undefined') ? sprite.originY : (sprite.origin ? sprite.origin.y : 0.5);
    const offsetX = Math.round((sprite.displayWidth - w) * 0.5);
    let offsetY;
    if (Math.abs(originY - 1) < 0.01) {
        offsetY = Math.round(sprite.displayHeight - h);
    } else {
        offsetY = Math.round((sprite.displayHeight - h) * 0.5);
    }
    sprite.body.setOffset(offsetX, offsetY);
}

let isGliding = false, isSpinning = false;
let lastLandedAt = 0, landRollWindow = 320;
let isGrinding = false, rails = [], currentRail = null, grindT = 0, grindDir = { x: 0, y: 0 }, grindSpeed = 0;
const abilityCooldowns = {
    spiral: { last: 0, duration: 1000 },
    glide: { last: 0, duration: 0 }
};
let controlsUI, cdSpiral, cdGlide;

function pointLineClosest(line, px, py) {
    const x1 = line.x1, y1 = line.y1, x2 = line.x2, y2 = line.y2;
    const vx = x2 - x1, vy = y2 - y1;
    const wx = px - x1, wy = py - y1;
    const len2 = vx * vx + vy * vy;
    const t = len2 === 0 ? 0 : Math.max(0, Math.min(1, (vx * wx + vy * wy) / len2));
    const cx = x1 + vx * t;
    const cy = y1 + vy * t;
    const dist = Math.hypot(px - cx, py - cy);
    return { t, dist };
}

function preload() {
    const rt = this.make.graphics({ x: 0, y: 0, add: false });
    rt.fillStyle(0xffffff);
    rt.fillRect(12, 0, 8, 8);
    rt.fillRect(10, 10, 12, 18);
    rt.fillRect(6, 11, 4, 14);
    rt.fillRect(22, 11, 4, 14);
    rt.fillRect(10, 28, 5, 20);
    rt.fillRect(17, 28, 5, 20);
    rt.generateTexture('humanoid', 32, 48);

    const p = this.make.graphics({ x: 0, y: 0, add: false });
    p.fillStyle(0xffffff);
    p.fillRect(0, 0, 4, 4);
    p.generateTexture('pixel', 4, 4);

    // Flag Texture for Checkpoints
    const f = this.make.graphics({ x:0, y:0, add: false });
    f.fillStyle(0x333333);
    f.fillRect(0, 0, 4, 48); // Pole
    f.fillStyle(0xff0000);
    f.fillTriangle(4, 0, 4, 20, 24, 10); // Flag
    f.generateTexture('flag_off', 32, 48);

    const f2 = this.make.graphics({ x:0, y:0, add: false });
    f2.fillStyle(0x333333);
    f2.fillRect(0, 0, 4, 48);
    f2.fillStyle(0x00ff88);
    f2.fillTriangle(4, 0, 4, 20, 24, 10);
    f2.generateTexture('flag_on', 32, 48);
}

function playBlip(freq, duration = 0.08, type = 'sine', vol = 0.18) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(vol, now + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    o.connect(g); g.connect(masterGain);
    o.start(now);
    o.stop(now + duration + 0.02);
}

function playNoise(duration = 0.12, volume = 0.12) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const bufferSize = Math.floor(audioCtx.sampleRate * duration);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buffer;
    g.gain.value = volume;
    src.connect(g); g.connect(masterGain);
    src.start();
}

function playDiveSfx() { playBlip(800, 0.06, 'sawtooth', 0.16); playNoise(0.08, 0.06); }
function playRollSfx() { playBlip(220, 0.14, 'square', 0.18); playNoise(0.12, 0.12); }
function playLandSfx() { playBlip(180, 0.12, 'sine', 0.14); playNoise(0.08, 0.06); }
function playSpeedSfx() { playBlip(900, 0.04, 'sine', 0.08); }

function showTutorial(message) {
    if (!tutorialTextElement) return;
    tutorialTextElement.innerText = message;
    
    gsap.killTweensOf(tutorialTextElement);
    gsap.fromTo(tutorialTextElement, 
        { scale: 0.2, opacity: 0, xPercent: -50, yPercent: -50 }, 
        { 
            scale: 1.2, 
            opacity: 1, 
            duration: 0.4, 
            ease: "back.out(2)", 
            onComplete: () => {
                gsap.to(tutorialTextElement, { scale: 1, duration: 0.2 });
                gsap.to(tutorialTextElement, { 
                    opacity: 0, 
                    duration: 1.2, 
                    delay: 2.5, 
                    ease: "power2.in" 
                });
            }
        }
    );
}

function updateMenuStarsUI() {
    let stats = JSON.parse(localStorage.getItem('vaultStats')) || {1: [false,false,false], 2: [false,false,false]};
    for(let lvl = 1; lvl <= 2; lvl++) {
        let starDiv = document.getElementById(`menu-star-${lvl}`);
        if(starDiv) {
            starDiv.innerHTML = stats[lvl].map(earned => `<span class="${earned ? 'earned' : ''}">★</span>`).join('');
        }
    }
}

// Menu Navigation Helpers
function startLevel(lvl) {
    document.getElementById('level-selector').style.display = 'none';
    sceneRef.scene.restart({ level: lvl });
}

function returnToMenu() {
    document.getElementById('rating-screen').style.display = 'none';
    sceneRef.scene.restart({ level: 0 });
}

function restartLevel() {
    document.getElementById('rating-screen').style.display = 'none';
    sceneRef.scene.restart({ level: currentLevel });
}

function nextLevel() {
    document.getElementById('rating-screen').style.display = 'none';
    let next = currentLevel === 1 ? 2 : 0; 
    sceneRef.scene.restart({ level: next });
}

function create(data) {
    sceneRef = this;
    currentLevel = typeof data.level !== 'undefined' ? data.level : 0;
    
    // UI Setup
    tutorialTextElement = document.getElementById('tutorial-text');
    staminaFill = document.getElementById('stamina-fill');
    staminaBox = document.getElementById('stamina-box');
    
    // Check if showing Menu
    if (currentLevel === 0) {
        document.getElementById('level-selector').style.display = 'flex';
        document.getElementById('ui-layer').style.display = 'none';
        if(controlsUI) controlsUI.style.display = 'none';
        updateMenuStarsUI();
        return; // Halt game creation
    }

    // Initialize UI for Play
    document.getElementById('level-selector').style.display = 'none';
    document.getElementById('ui-layer').style.display = 'block';
    if(controlsUI) controlsUI.style.display = 'block';

    const banner = document.getElementById('level-banner');
    banner.innerText = currentLevel === 1 ? 'LEVEL 1 - THE FOUNDRY' : 'LEVEL 2 - THE NEON THRESHER';
    banner.style.display = 'block';
    banner.style.opacity = 1;
    
    // Reset Globals
    startTime = performance.now();
    levelFinished = false;
    stylePoints = 0;
    maxVelocityReached = 0;
    stamina = 100;
    isGrinding = false;
    isSprinting = false; 
    isSliding = false; 
    isGrabbing = false; 
    isDiving = false; 
    isRolling = false;
    rails = [];
    document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));

    try {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.22;
            masterGain.connect(audioCtx.destination);
        }
    } catch (e) { console.warn('Audio init failed', e); }

    const resumeAudio = () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); window.removeEventListener('pointerdown', resumeAudio); window.removeEventListener('keydown', resumeAudio); };
    window.addEventListener('pointerdown', resumeAudio);
    window.addEventListener('keydown', resumeAudio);

    platforms = this.physics.add.staticGroup();
    checkpoints = this.physics.add.staticGroup();
    tutorialTriggerZones = this.physics.add.staticGroup();
    hidingSpots = this.physics.add.staticGroup();

    const { width, height } = this.scale;
    const floorY = height - 40;

    // ----- LEVEL BUILDER -----
    if (currentLevel === 1) {
        // LEVEL 1: THE FOUNDRY DESIGN
        platforms.add(this.add.rectangle(400, floorY, 800, 80, 0x1a1a1a)); // Starting Block
        platforms.add(this.add.rectangle(1500, floorY, 1200, 80, 0x1a1a1a)); // Sprint Straight
        
        let cp1 = checkpoints.create(100, floorY - 60, 'flag_on');
        checkpoint = { x: 100, y: floorY - 100 };

        platforms.add(this.add.rectangle(2400, floorY - 150, 200, 20, 0x333333)); 
        platforms.add(this.add.rectangle(2700, floorY - 300, 200, 20, 0x333333)); 
        platforms.add(this.add.rectangle(3200, floorY - 450, 400, 20, 0x444444)); 
        
        checkpoints.create(3100, floorY - 510, 'flag_off');
        platforms.add(this.add.rectangle(4500, floorY, 600, 80, 0x1a1a1a)); 

        platforms.add(this.add.rectangle(5500, floorY, 1000, 80, 0x1a1a1a)); 
        platforms.add(this.add.rectangle(5500, floorY - 60, 1000, 20, 0x333333)); 
        
        platforms.add(this.add.rectangle(6800, floorY, 400, 80, 0x1a1a1a)); 

        platforms.add(this.add.rectangle(7500, floorY - 300, 40, 600, 0x222222)); 
        platforms.add(this.add.rectangle(7800, floorY - 300, 40, 600, 0x222222)); 

        rails = [{ x1: 8200, y1: floorY - 100, x2: 9000, y2: floorY - 400 }];
        const railG = this.add.graphics();
        railG.lineStyle(6, 0x66ccff, 1);
        rails.forEach(r => railG.strokeLineShape(new Phaser.Geom.Line(r.x1, r.y1, r.x2, r.y2)));

        finishLine = this.add.rectangle(9500, floorY - 200, 10, 400, 0xffffff);
        this.physics.add.existing(finishLine, true);

        const tutorials = [
            { x: 300, y: floorY - 200, w: 200, h: 400, msg: "A / D TO MOVE" },
            { x: 1000, y: floorY - 200, w: 200, h: 400, msg: "HOLD SHIFT TO SPRINT" },
            { x: 2200, y: floorY - 200, w: 200, h: 400, msg: "SPACE TO JUMP" },
            { x: 3400, y: floorY - 400, w: 300, h: 800, msg: "HOLD SHIFT IN AIR TO GLIDE" },
            { x: 5100, y: floorY - 200, w: 200, h: 400, msg: "S TO CROUCH / CTRL TO SLIDE" },
            { x: 6400, y: floorY - 200, w: 200, h: 400, msg: "CTRL IN AIR TO DIVE" },
            { x: 7300, y: floorY - 300, w: 200, h: 600, msg: "JUMP AGAINST WALLS TO CLIMB" },
            { x: 8100, y: floorY - 200, w: 200, h: 400, msg: "JUMP ONTO RAILS TO GRIND" }
        ];

        tutorials.forEach(t => {
            let zone = this.add.zone(t.x, t.y, t.w, t.h);
            this.physics.add.existing(zone, true);
            zone.tutorialMsg = t.msg;
            zone.triggered = false;
            tutorialTriggerZones.add(zone);
        });
    } else if (currentLevel === 2) {
        // LEVEL 2: THE NEON THRESHER
        checkpoint = { x: 100, y: floorY - 100 };
        checkpoints.create(100, floorY - 60, 'flag_on');

        wallSpeed = 250;
        speedingWall = this.add.rectangle(-800, floorY - 300, 40, 800, 0xff0000);
        this.physics.add.existing(speedingWall);
        speedingWall.body.allowGravity = false;

        // 1.1 - 1.2 Start and Sprint
        platforms.add(this.add.rectangle(400, floorY, 800, 80, 0x1a1a1a));

        // 1.3 Hiding Spot Alpha (800)
        let hs1 = this.add.rectangle(800, floorY - 60, 100, 120, 0x222222);
        this.physics.add.existing(hs1, true);
        hidingSpots.add(hs1);

        // 1.4 Checkpoint Alpha (1000)
        checkpoints.create(1000, floorY - 60, 'flag_off');
        platforms.add(this.add.rectangle(1000, floorY, 400, 80, 0x1a1a1a));

        // 2.1 Vent Shaft (1200 - 2500)
        platforms.add(this.add.rectangle(1850, floorY, 1300, 80, 0x1a1a1a)); 
        platforms.add(this.add.rectangle(1500, floorY - 80, 600, 40, 0x333333)); // Ceiling 1
        
        // 2.2 Mid-Tunnel Hiding Spot (1800)
        let hs2 = this.add.rectangle(1850, floorY - 80, 100, 160, 0x222222);
        this.physics.add.existing(hs2, true);
        hidingSpots.add(hs2);

        platforms.add(this.add.rectangle(2150, floorY - 80, 500, 40, 0x333333)); // Ceiling 2
        
        // 2.3 Gap Jump (2400 - 2600 is pit)
        
        // 3.1 Velocity Escape
        platforms.add(this.add.rectangle(2700, floorY, 200, 80, 0x1a1a1a)); // Landing
        
        // Trigger for wall speed
        wallSpeedTrigger = this.add.zone(2500, floorY - 200, 100, 600);
        this.physics.add.existing(wallSpeedTrigger, true);
        wallSpeedTrigger.active = true;
        
        // 3.2 Speed Rail (2800 - 3400)
        rails = [{ x1: 2800, y1: floorY - 100, x2: 3400, y2: floorY - 100 }];
        const railG = this.add.graphics();
        railG.lineStyle(6, 0x66ccff, 1);
        rails.forEach(r => railG.strokeLineShape(new Phaser.Geom.Line(r.x1, r.y1, r.x2, r.y2)));
        
        // 3.3 Final Hiding Spot (3400)
        platforms.add(this.add.rectangle(3450, floorY, 300, 80, 0x1a1a1a)); 
        let hs3 = this.add.rectangle(3450, floorY - 60, 100, 120, 0x222222);
        this.physics.add.existing(hs3, true);
        hidingSpots.add(hs3);
        
        // 3.4 Exit Portal
        platforms.add(this.add.rectangle(3800, floorY, 600, 80, 0x1a1a1a)); 
        finishLine = this.add.rectangle(4000, floorY - 200, 40, 400, 0xffffff);
        this.physics.add.existing(finishLine, true);

        const tutorials2 = [
            { x: 200, y: floorY - 200, w: 200, h: 400, msg: "SYSTEM ALERT: THRESHER ACTIVE. FIND COVER." },
            { x: 700, y: floorY - 200, w: 200, h: 400, msg: "STAY IN THE SHADOWS" },
            { x: 1100, y: floorY - 200, w: 200, h: 400, msg: "SLIDE TO SURVIVE THE VENT" }
        ];
        tutorials2.forEach(t => {
            let zone = this.add.zone(t.x, t.y, t.w, t.h);
            this.physics.add.existing(zone, true);
            zone.tutorialMsg = t.msg;
            zone.triggered = false;
            tutorialTriggerZones.add(zone);
        });
    }

    // AMBIENT VISUALS
    windEmitter = this.add.particles(0, 0, 'pixel', {
        x: { min: 0, max: 10000 }, y: -10, alpha: { start: 0.2, end: 0 },
        scale: { min: 0.5, max: 1.5 }, speedY: { min: 200, max: 400 },
        gravityX: 150, lifespan: 3000, frequency: 50
    });

    trailEmitter = this.add.particles(0, 0, 'humanoid', {
        speed: 0, scale: { start: 1, end: 0.8 }, alpha: { start: 0.3, end: 0 },
        lifespan: 150, frequency: -1, blendMode: 'ADD'
    });

    landEmitter = this.add.particles(0, 0, 'pixel', {
        speed: { min: 100, max: 200 }, angle: { min: 190, max: 350 },
        scale: { start: 2, end: 0 }, lifespan: 500, gravityY: 400, emitting: false
    });

    controlsUI = document.getElementById('controls');
    if(!controlsUI) {
        controlsUI = document.createElement('div');
        controlsUI.id = 'controls';
        controlsUI.innerHTML = `
            <div class="ctrl"><div><div class="label">Move</div><div class="keys">A / D <span id="cdnum-move" class="cd-number"></span></div></div></div>
            <div class="ctrl"><div><div class="label">Jump</div><div class="keys">SPACE <span id="cdnum-jump" class="cd-number"></span></div></div></div>
            <div class="ctrl"><div><div class="label">Crouch / Down</div><div class="keys">S <span id="cdnum-crouch" class="cd-number"></span></div></div></div>
            <div class="ctrl"><div><div class="label">Slide / Dive</div><div class="keys">CTRL <span id="cdnum-slide" class="cd-number"></span></div></div></div>
            <div class="ctrl"><div><div class="label">Sprint</div><div class="keys">Hold SHIFT + A/D <span id="cdnum-sprint" class="cd-number"></span></div></div></div>
            <div class="ctrl"><div><div class="label">Dash-Cancel</div><div class="keys">SPACE during slide <span id="cdnum-dash" class="cd-number"></span></div></div></div>
            <div class="ctrl"><div><div class="label">Spiral Jump</div><div class="keys">A/D + SPACE <span id="cdnum-spiral" class="cd-number"></span></div></div></div>
            <div class="ctrl"><div><div class="label">Glide</div><div class="keys">Hold SHIFT <span id="cdnum-glide" class="cd-number"></span></div></div></div>
        `;
        document.body.appendChild(controlsUI);
    }
    cdSpiral = document.getElementById('cdnum-spiral');
    cdGlide = document.getElementById('cdnum-glide');

    player = this.physics.add.sprite(checkpoint.x, checkpoint.y, 'humanoid');
    player.setOrigin(0.5, 1);
    player.setCollideWorldBounds(false); 
    player.setDamping(true);
    player.setDragX(0.01);
    syncBody(player);

    this.cameras.main.startFollow(player, true, 0.1, 0.1);
    this.cameras.main.setZoom(1.1);
    this.cameras.main.setBounds(0, 0, 10000, height);

    speedLines = this.add.graphics();
    speedLines.setScrollFactor(0);

    // Colliders
    this.physics.add.collider(player, platforms, (p, plat) => {
        if (plat && plat.body && p && p.body) {
            const overlap = (p.body.y + p.body.height) - plat.body.y;
            if (overlap > 0 && p.body.velocity.y >= 0) {
                p.y -= (overlap + 1);
                syncBody(p);
            }
        }
        if (p.body.wasTouching.none && p.body.touching.down) {
            lastLandedAt = performance.now();
            landEmitter.emitParticleAt(p.x, p.y + 24, 12);
            this.tweens.add({ targets: p, scaleX: 1.4, scaleY: 0.6, duration: 80, yoyo: true, onUpdate: () => syncBody(p), onComplete: () => syncBody(p) });
            if (isDiving) {
                isDiving = false; isRolling = true;
                const preserved = Phaser.Math.Clamp(Math.abs(p.body.velocity.x) * 0.95, 300, 1100);
                const dir = p.flipX ? -1 : 1;
                p.setVelocityX(dir * preserved);
                this.tweens.add({ targets: p, scaleY: 0.6, scaleX: 1.4, duration: 350, onUpdate: () => syncBody(p), onComplete: () => { isRolling = false; p.setScale(1); syncBody(p); } });
                playRollSfx(); stylePoints += 50;
            } else { playLandSfx(); }
        }
    });

    this.physics.add.overlap(player, tutorialTriggerZones, (p, zone) => {
        if (!zone.triggered) {
            showTutorial(zone.tutorialMsg);
            zone.triggered = true;
        }
    });

    this.physics.add.overlap(player, checkpoints, (p, cp) => {
        if(cp.texture.key === 'flag_off') {
            cp.setTexture('flag_on');
            checkpoint = { x: cp.x, y: cp.y };
            playBlip(600, 0.2, 'sine', 0.1);
        }
    });

    this.physics.add.overlap(player, finishLine, () => {
        if (!levelFinished) {
            levelFinished = true;
            endTime = performance.now();
            showRating();
        }
    });

    keys = this.input.keyboard.addKeys('W,A,S,D,SHIFT,CTRL,SPACE');

    // Fade banner
    this.tweens.add({
        targets: document.getElementById('level-banner'),
        opacity: 0,
        duration: 3000,
        delay: 2000,
        onComplete: () => { document.getElementById('level-banner').style.display = 'none'; }
    });
}

function update() {
    if (currentLevel === 0) return; // Menu state
    if (levelFinished) return;

    // Reset if falling out of world
    if (player.y > this.scale.height + 200) {
        player.setPosition(checkpoint.x, checkpoint.y);
        player.setVelocity(0, 0);
        stamina = 100;
        if(currentLevel === 2 && speedingWall) {
            speedingWall.x = checkpoint.x - 1000;
            wallSpeed = 250;
            wallSpeedTrigger.active = true;
        }
    }

    // --- LEVEL 2: THRESHER MECHANICS ---
    if (currentLevel === 2 && speedingWall) {
        let dt = this.game.loop.delta / 1000;
        speedingWall.x += wallSpeed * dt;
        
        isHidden = false;
        this.physics.overlap(player, hidingSpots, () => { isHidden = true; });
        
        if (wallSpeedTrigger && wallSpeedTrigger.active) {
            this.physics.overlap(player, wallSpeedTrigger, () => {
                wallSpeedTrigger.active = false;
                wallSpeed = 350;
                showTutorial("WALL VELOCITY INCREASED");
            });
        }

        if (!isHidden && player.x < speedingWall.x + 20 && player.x > speedingWall.x - 400) {
            player.setPosition(checkpoint.x, checkpoint.y);
            player.setVelocity(0, 0);
            speedingWall.x = checkpoint.x - 1000;
            wallSpeed = 250;
            wallSpeedTrigger.active = true;
            stamina = 100;
            playRollSfx();
            this.cameras.main.flash(500, 255, 0, 0);
        }

        let dist = player.x - speedingWall.x;
        if (dist > 0 && dist < 600) {
            let intensity = (600 - dist) / 600;
            this.cameras.main.shake(100, 0.005 * intensity);
            
            if (stamina < 10) {
                staminaBox.style.borderColor = 'red';
                staminaBox.style.boxShadow = '0 0 10px red';
            } else {
                staminaBox.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                staminaBox.style.boxShadow = 'none';
            }
            
            if (performance.now() - lastDroneTime > 200) {
                playBlip(150 + (intensity * 200), 0.1, 'sawtooth', 0.1 * intensity);
                lastDroneTime = performance.now();
            }
        } else {
            staminaBox.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            staminaBox.style.boxShadow = 'none';
        }
    }

    // --- MOVEMENT ---
    const isGrounded = player.body.touching.down;
    let targetSpeed = 350;
    let acceleration = 3000;

    if (keys.SHIFT.isDown && (keys.A.isDown || keys.D.isDown) && stamina > 0 && !isSliding) {
        isSprinting = true;
        targetSpeed = 650;
        stamina = Math.max(0, stamina - 0.7);
    } else {
        isSprinting = false;
        stamina = Math.min(100, stamina + 0.4);
    }

    staminaFill.style.transform = `scaleX(${stamina / 100})`;
    const hue = (stamina / 100) * 120;
    staminaFill.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;

    if (keys.SHIFT.isDown && stamina <= 0) {
        gsap.to(staminaBox, { x: "+=3", duration: 0.05, yoyo: true, repeat: 3 });
    }

    if (!isSliding && !isGrabbing && !isRolling) {
        if (keys.A.isDown) {
            player.setAccelerationX(-acceleration);
            player.setFlipX(true);
            player.setAngle(-8);
        } else if (keys.D.isDown) {
            player.setAccelerationX(acceleration);
            player.setFlipX(false);
            player.setAngle(8);
        } else {
            player.setAccelerationX(0);
            player.setDragX(0.0001);
            player.setAngle(0);
        }
    }

    const maxVertical = isGliding ? 500 : 1200;
    player.setMaxVelocity(targetSpeed, maxVertical);
    
    maxVelocityReached = Math.max(maxVelocityReached, Math.abs(player.body.velocity.x));

    // RAIL GRIND
    if (!isGrinding) {
        if (Math.abs(player.body.velocity.x) > 280 && rails && rails.length) {
            for (let r of rails) {
                const res = pointLineClosest(r, player.x, player.y);
                if (res.dist < 20) {
                    isGrinding = true;
                    currentRail = r;
                    grindT = res.t;
                    const vx = r.x2 - r.x1, vy = r.y2 - r.y1;
                    const len = Math.sqrt(vx * vx + vy * vy) || 1;
                    grindDir.x = vx / len; grindDir.y = vy / len;
                    grindSpeed = Math.max(360, Math.abs(player.body.velocity.x));
                    player.body.allowGravity = false;
                    player.body.setVelocity(0, 0);
                    stylePoints += 100;
                    break;
                }
            }
        }
    } else {
        const dt = this.game.loop.delta / 1000;
        const vx = currentRail.x2 - currentRail.x1, vy = currentRail.y2 - currentRail.y1;
        const railLen = Math.sqrt(vx * vx + vy * vy) || 1;
        grindT += (grindSpeed * dt) / railLen;
        if (grindT >= 1 || grindT <= 0) {
            isGrinding = false;
            player.body.allowGravity = true;
            player.setVelocityX(grindDir.x * grindSpeed);
            player.setVelocityY(-480);
        } else {
            player.setPosition(currentRail.x1 + vx * grindT, currentRail.y1 + vy * grindT);
            grindSpeed = Math.min(1400, grindSpeed + 160 * dt);
            if (Phaser.Input.Keyboard.JustDown(keys.SPACE)) {
                isGrinding = false;
                player.body.allowGravity = true;
                player.setVelocityX(grindDir.x * (grindSpeed + 300));
                player.setVelocityY(-700);
                playRollSfx(); stylePoints += 150;
            }
        }
        syncBody(player);
    }

    // SPIRAL JUMP
    if ((player.body.blocked.left || player.body.blocked.right) && !isGrounded && Phaser.Input.Keyboard.JustDown(keys.SPACE) && (performance.now() - abilityCooldowns.spiral.last >= abilityCooldowns.spiral.duration)) {
        abilityCooldowns.spiral.last = performance.now();
        const dir = player.body.blocked.left ? 1 : -1;
        player.setVelocityY(-900);
        player.setVelocityX(dir * 900);
        isSpinning = true;
        this.tweens.add({ targets: player, angle: dir * 720, duration: 600, onUpdate: () => syncBody(player), onComplete: () => { player.setAngle(0); isSpinning = false; syncBody(player); } });
        playRollSfx(); stylePoints += 200;
    }

    if (Phaser.Input.Keyboard.JustDown(keys.SPACE)) {
        if (isGrounded) {
            player.setVelocityY(-800);
            this.tweens.add({ targets: player, scaleX: 0.7, scaleY: 1.3, duration: 100, yoyo: true, onUpdate: () => syncBody(player), onComplete: () => syncBody(player) });
        } else if (isGrabbing) {
            isGrabbing = false; player.body.allowGravity = true;
            player.setVelocityY(-700); player.setVelocityX(player.flipX ? 500 : -500);
        }
    }

    // SLIDE / DIVE
    if (Phaser.Input.Keyboard.JustDown(keys.CTRL) && !isSliding && !isDiving && !isRolling && stamina > 10) {
        if (isGrounded) {
            isSliding = true; stamina -= 20;
            const dir = player.flipX ? -1 : 1;
            player.setVelocityX(dir * 1100);
            this.tweens.add({ targets: player, scaleY: 0.4, scaleX: 1.6, duration: 100, onUpdate: () => syncBody(player), onComplete: () => syncBody(player) });
            this.time.delayedCall(450, () => { if (isSliding) { isSliding = false; player.setScale(1); syncBody(player); } });
            playSpeedSfx(); stylePoints += 25;
        } else {
            isDiving = true; stamina = Math.max(0, stamina - 10);
            const dir = player.flipX ? -1 : 1;
            player.setVelocityX(dir * 900); player.setVelocityY(600);
            player.body.allowGravity = true;
            this.tweens.add({ targets: player, angle: dir * -30, duration: 200 });
            playDiveSfx();
        }
    }

    if (isSliding && Phaser.Input.Keyboard.JustDown(keys.SPACE)) {
        isSliding = false; player.setScale(1); syncBody(player);
        player.setVelocityY(-600); stylePoints += 75; 
    }

    if (!isGrounded && keys.SHIFT.isDown && player.body.velocity.y > 0) {
        if (!isGliding) isGliding = true;
        player.body.setGravityY(-1200); player.setDragX(30);
    } else if (isGliding) {
        isGliding = false; player.body.setGravityY(0); player.setDragX(0.01);
    }

    if (!isGrounded && player.body.velocity.y > 0) {
        if (player.body.blocked.left || player.body.blocked.right) {
            isGrabbing = true; player.setVelocity(0, 0); player.body.allowGravity = false;
        }
    }
    if (isGrabbing && (keys.S.isDown || keys.SPACE.isDown)) {
        isGrabbing = false; player.body.allowGravity = true;
    }

    if (Math.abs(player.body.velocity.x) > 400 || isSliding || isDiving) {
        trailEmitter.emitParticleAt(player.x, player.y);
    }

    const speed = Math.abs(player.body.velocity.x);
    const intensity = Phaser.Math.Clamp((speed - 420) / (1100 - 420), 0, 1);
    
    const now = performance.now();
    function setCd(el, last, dur) {
        if (!el) return;
        const remaining = Math.max(0, dur - (now - last));
        el.innerText = remaining > 0 ? Math.ceil(remaining / 1000) : '0';
    }
    setCd(cdSpiral, abilityCooldowns.spiral.last, abilityCooldowns.spiral.duration);
    setCd(cdGlide, abilityCooldowns.glide.last, abilityCooldowns.glide.duration);

    if (intensity > 0.02) {
        speedLines.clear();
        speedLines.lineStyle(2, 0xffffff, 0.08 * intensity);
        for (let i = 0; i < 12; i++) {
            const sx = Math.random() * this.scale.width, sy = Math.random() * this.scale.height;
            speedLines.strokeLineShape(new Phaser.Geom.Line(sx, sy, sx + (player.body.velocity.x * 0.1), sy));
        }
        if (performance.now() - lastSpeedSfx > 220 + (1 - intensity) * 600) { playSpeedSfx(); lastSpeedSfx = performance.now(); }
    } else { speedLines.clear(); }
}

function showRating() {
    const totalTime = ((endTime - startTime) / 1000).toFixed(2);
    const flowPercent = Math.min(100, Math.floor((maxVelocityReached / 1400) * 100));
    
    document.getElementById('stat-time').innerText = `TIME: ${totalTime}s`;
    document.getElementById('stat-style').innerText = `STYLE: ${stylePoints}`;
    document.getElementById('stat-flow').innerText = `MAX FLOW: ${flowPercent}%`;
    
    let starsEarned = [false, false, false];

    if (totalTime < 30) { document.getElementById('star1').classList.add('active'); starsEarned[0] = true; }
    if (stylePoints > 500) { document.getElementById('star2').classList.add('active'); starsEarned[1] = true; }
    if (flowPercent > 80) { document.getElementById('star3').classList.add('active'); starsEarned[2] = true; }
    
    // Save Rating
    let stats = JSON.parse(localStorage.getItem('vaultStats')) || {1: [false,false,false], 2: [false,false,false]};
    // Keep best stars
    for(let i=0; i<3; i++) {
        if(starsEarned[i]) stats[currentLevel][i] = true;
    }
    localStorage.setItem('vaultStats', JSON.stringify(stats));

    document.getElementById('rating-screen').style.display = 'block';
}

window.addEventListener('resize', () => { game.scale.resize(window.innerWidth, window.innerHeight); });
</script>
</body>
